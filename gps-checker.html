<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Auditor Pro V37</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --border: #334155; --primary: #3b82f6; --danger: #ef4444; --text: #f1f5f9; --muted: #94a3b8; --success: #10b981; }
        * { box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui; height: 100vh; display: flex; font-size: 13px; overflow: hidden; }

        .sidebar { width: 320px; background: var(--panel); border-right: 1px solid var(--border); padding: 15px; display: flex; flex-direction: column; gap: 15px; flex-shrink: 0; }
        .header { color: var(--primary); font-weight: 800; font-size: 16px; display: flex; align-items: center; gap: 8px; text-transform: uppercase; letter-spacing: 1px; }
        
        .control { display: flex; flex-direction: column; gap: 8px; background: #131824; padding: 10px; border-radius: 6px; border: 1px solid var(--border); }
        .lbl { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; margin-bottom: 2px; display: block; }
        input, select { background: var(--bg); border: 1px solid var(--border); color: white; padding: 8px; border-radius: 4px; width: 100%; outline: none; font-weight: bold; }
        
        /* LISTE VÉHICULES */
        .truck-list-container { flex: 1; min-height: 0; display: flex; flex-direction: column; border: 1px solid var(--border); border-radius: 6px; background: #131824; }
        .truck-list { flex: 1; overflow-y: auto; }
        .t-item { padding: 10px; border-bottom: 1px solid #1e293b; display: flex; gap: 10px; align-items: center; cursor: pointer; transition: 0.1s; }
        .t-item:hover { background: #1e293b; }
        .t-item input { width: 16px; height: 16px; margin: 0; accent-color: var(--primary); cursor: pointer; }
        .t-name { font-size: 12px; font-weight: 500; }

        .btn { padding: 12px; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; text-transform: uppercase; color: white; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; font-size: 11px; }
        .btn-run { background: var(--primary); } .btn-run:hover { background: #2563eb; }
        .btn-save { background: var(--success); flex: 1; } .btn-save:hover { background: #059669; }
        .btn-exp { background: #f59e0b; color: #000; flex: 1; } .btn-exp:hover { background: #d97706; }
        
        .btn-clear { background: transparent; border: 1px solid #334155; color: #64748b; font-size: 10px; padding: 8px; margin-top: 5px; }
        .btn-clear:hover { border-color: var(--danger); color: var(--danger); }

        .main { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 20px; overflow: hidden; }
        .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .card { background: var(--panel); border: 1px solid var(--border); padding: 20px; border-radius: 8px; border-bottom: 4px solid transparent; }
        .val { font-size: 28px; font-weight: 700; margin: 5px 0; }
        
        .feed { width: 420px; background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        .nav-tabs { display: flex; background: #131824; border-bottom: 1px solid var(--border); }
        .nav-btn { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: 700; color: var(--muted); border-bottom: 3px solid transparent; transition: 0.2s; }
        .nav-btn.active { color: white; border-bottom-color: var(--primary); background: var(--panel); }

        .panel-content { flex: 1; overflow-y: auto; display: none; flex-direction: column; }
        .panel-content.active { display: flex; }

        .item { padding: 12px; border-bottom: 1px solid var(--border); font-size: 12px; cursor: help; background: #1e293b; margin-bottom: 6px; border-radius: 4px; position: relative; }
        .item:hover { background: #263345; }
        
        .history-item { padding: 15px; border-bottom: 1px solid #334155; cursor: pointer; position: relative; transition: 0.1s; }
        .history-item:hover { background: #263345; }
        .h-del { position: absolute; right: 15px; top: 15px; color: var(--danger); opacity: 0.7; }
        .h-del:hover { opacity: 1; }

        /* BARRE DE PROGRESSION PLUS CLAIRE */
        .progress-container { height: 10px; background: #131824; border-radius: 5px; overflow: hidden; margin-top: auto; border: 1px solid #334155; }
        #progressBar { width: 0%; height: 100%; background: linear-gradient(90deg, #3b82f6, #60a5fa); transition: width 0.1s linear; }

        /* LOG PLUS GRAND */
        #consoleLog { background: #000; border-radius: 6px; padding: 15px; font-family: 'Consolas', monospace; height: 250px; overflow-y: auto; border: 1px solid #334155; color: #ccc; font-size: 11px; display: flex; flex-direction: column; gap: 4px; }

        #forensic-tooltip {
            position: fixed; z-index: 9999; background: rgba(15, 23, 42, 0.98);
            border: 1px solid var(--border); border-radius: 8px; padding: 15px; width: 300px;
            pointer-events: none; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            font-size: 12px; color: var(--text);
        }
    </style>
</head>
<body>

<div id="forensic-tooltip"></div>

<div class="sidebar">
    <div class="header"><i class="fa-solid fa-shield-halved"></i> AUDITEUR GPS PRO</div>
    
    <div class="control">
        <span class="lbl">Période d'Analyse</span>
        <input type="datetime-local" id="startDate" style="margin-bottom:5px">
        <input type="datetime-local" id="endDate">
    </div>

    <div class="truck-list-container">
        <div style="padding:10px; border-bottom:1px solid #334155; font-size:11px; font-weight:700; color:#94a3b8; display:flex; justify-content:space-between; align-items:center;">
            <span>VÉHICULES (<span id="selCount">0</span>)</span>
            <div>
                <a onclick="auditor.toggleAll(true)" style="cursor:pointer; color:#3b82f6; margin-right:5px;">Tous</a>
                <a onclick="auditor.toggleAll(false)" style="cursor:pointer; color:#cbd5e1">Aucun</a>
            </div>
        </div>
        <div id="truckListContainer" class="truck-list">
            <div style="padding:20px; text-align:center; color:#64748b;">Chargement...</div>
        </div>
    </div>

    <div class="control">
        <span class="lbl">Paramètres de Détection</span>
        <div style="margin-bottom:8px; display:flex; gap:10px;">
            <div style="flex:1">
                <span class="lbl">Tolérance (Min)</span>
                <input type="number" id="gapTolerance" value="15">
            </div>
            <div style="flex:1">
                <span class="lbl">Mode</span>
                <select id="sensitivity" style="height:32px;">
                    <option value="normal">Normal</option>
                    <option value="high">Strict</option>
                    <option value="paranoid" selected>Paranoïaque</option>
                </select>
            </div>
        </div>
    </div>

    <button class="btn btn-run" id="btnStart" onclick="auditor.startAudit()">
        <i class="fa-solid fa-play"></i> LANCER L'AUDIT
    </button>
    <div style="display:flex; gap:5px; margin-top:5px;">
        <button class="btn btn-save" onclick="auditor.saveAuditToDB()"><i class="fa-solid fa-floppy-disk"></i> SAUVER</button>
        <button class="btn btn-exp" onclick="auditor.exportReport()"><i class="fa-solid fa-file-export"></i> RAPPORT</button>
    </div>
    <button class="btn btn-clear" onclick="auditor.clearAll()">
        <i class="fa-solid fa-eraser"></i> Effacer l'écran
    </button>
</div>

<div class="main">
    <div class="cards">
        <div class="card" style="border-bottom-color:var(--danger)">
            <div class="lbl">Coupures / Hors Ligne</div>
            <div class="val" id="kpiDowntime">0h</div>
        </div>
        <div class="card" style="border-bottom-color:var(--primary)">
            <div class="lbl">Stationnement</div>
            <div class="val" id="kpiSleep">0h</div>
        </div>
        <div class="card" style="border-bottom-color:var(--success)">
            <div class="lbl">Temps Actif</div>
            <div class="val" id="kpiUptime">0h</div>
        </div>
        <div class="card">
            <div class="lbl">Score Fiabilité</div>
            <div class="val" id="kpiScore">100%</div>
        </div>
    </div>

    <div id="consoleLog">
        <div style="color:#64748b;">Système Prêt. Sélectionnez les véhicules.</div>
    </div>
    
    <div class="progress-container">
        <div id="progressBar"></div>
    </div>
</div>

<div class="feed">
    <div class="nav-tabs">
        <div class="nav-btn active" id="tabLive" onclick="switchMainTab('live')">RÉSULTATS LIVE</div>
        <div class="nav-btn" id="tabHist" onclick="switchMainTab('history')">HISTORIQUE BDD</div>
    </div>

    <div id="viewLive" class="panel-content active">
        <div style="padding:10px; border-bottom:1px solid #334155; display:flex; gap:10px;">
            <span onclick="auditor.filterFeed('cut', this)" class="pill active" style="cursor:pointer; background:#ef4444; padding:4px 10px; border-radius:4px; font-size:10px; font-weight:bold; color:white;">COUPURES (<span id="cntCuts">0</span>)</span>
            <span onclick="auditor.filterFeed('sleep', this)" class="pill" style="cursor:pointer; background:#1e293b; border:1px solid #334155; padding:4px 10px; border-radius:4px; font-size:10px; font-weight:bold; color:#cbd5e1;">PARKINGS (<span id="cntSleep">0</span>)</span>
        </div>
        <div id="feedContainer" style="flex:1; overflow-y:auto; padding:10px;"></div>
    </div>

    <div id="viewHistory" class="panel-content">
        <div style="padding:10px; text-align:center;">
            <button class="btn btn-exp" style="width:100%; background:transparent; border:1px solid #64748b; color:white;" onclick="auditor.loadHistoryList()">
                <i class="fa-solid fa-rotate"></i> ACTUALISER LISTE
            </button>
        </div>
        <div id="historyList" style="flex:1; overflow-y:auto;"></div>
    </div>
</div>

<script src="config.js"></script>
<script src="gps-audit.js"></script>
<script>
    function switchMainTab(view) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.panel-content').forEach(c => c.classList.remove('active'));
        if (view === 'live') {
            document.getElementById('tabLive').classList.add('active');
            document.getElementById('viewLive').classList.add('active');
        } else {
            document.getElementById('tabHist').classList.add('active');
            document.getElementById('viewHistory').classList.add('active');
            auditor.loadHistoryList();
        }
    }
</script>
</body>
</html>
